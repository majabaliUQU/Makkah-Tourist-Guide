<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="دليل الأماكن السياحية في مكة المكرمة — اكتشف المعالم الدينية والتاريخية والمعمارية" />
  <title>مكة المكرمة — دليل الأماكن السياحية</title>

  <!-- Google Fonts — Arabic Support -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Naskh+Arabic:wght@400;500;700&family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet" />

  <!--
    ══════════════════════════════════════════
    CSS Load Order (important):
      1. tokens.css    — design variables
      2. base.css      — reset + typography
      3. layout.css    — structural layout
      4. components.css — UI components
    ══════════════════════════════════════════
  -->
  <link rel="stylesheet" href="css/tokens.css" />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/components.css" />
</head>
<body>

  <div class="app-wrapper">

    <!-- ── Navigation ──────────────────────── -->
    <nav class="nav" role="navigation" aria-label="التنقل الرئيسي">
      <div class="container">
        <div class="nav-inner">
          <a href="#" class="nav-brand" aria-label="الصفحة الرئيسية">
            <span class="nav-brand-icon" aria-hidden="true">🕋</span>
            <span>
              <div class="nav-brand-text">مكة المكرمة</div>
              <div class="nav-brand-sub">دليل الأماكن السياحية</div>
            </span>
          </a>
        </div>
      </div>
    </nav>

    <!-- ── Hero ────────────────────────────── -->
    <!-- Dark section: Near Black (#141413) bg  -->
    <section class="hero" aria-label="مرحباً بك">
      <div class="container">
        <div class="hero-inner">
          <p class="hero-eyebrow">دليلك السياحي</p>
          <span class="hero-icon" aria-hidden="true">🕋</span>
          <h1 class="hero-title">اكتشف مكة المكرمة</h1>
          <p class="hero-subtitle">
            تصفح أبرز المعالم الدينية والتاريخية والمعمارية،
            واحفظ ملاحظاتك وأماكنك المفضلة.
          </p>
          <div class="hero-divider" aria-hidden="true"></div>
        </div>
      </div>
    </section>

    <!-- ── Stats ────────────────────────────── -->
    <!-- Ivory surface after dark hero          -->
    <section class="stats-section" aria-label="إحصائيات">
      <div class="container">
        <div class="stats-grid" id="statsBar" role="region" aria-live="polite">
          <!-- Rendered by app.js -->
        </div>
      </div>
    </section>

    <!-- ── Main Content ─────────────────────── -->
    <!-- Back to Parchment (#f5f4ed)             -->
    <main class="main-section" id="mainContent">
      <div class="container">

        <!-- Tabs -->
        <div class="tabs" role="tablist" aria-label="تصفح الأماكن">
          <button class="tab tab--active" role="tab" aria-selected="true"  aria-controls="tabContent">جميع الأماكن</button>
          <button class="tab"             role="tab" aria-selected="false" aria-controls="tabContent">المفضلة ⭐</button>
          <button class="tab"             role="tab" aria-selected="false" aria-controls="tabContent">إضافة مكان +</button>
        </div>

        <!-- Dynamic content area -->
        <div id="tabContent" role="tabpanel" aria-live="polite">
          <!-- Rendered by app.js -->
        </div>

      </div>
    </main>

    <!-- ── Footer ───────────────────────────── -->
    <!-- Dark section again: Near Black          -->
    <footer class="footer" role="contentinfo">
      <div class="container">
        <p>مكة المكرمة — دليل الأماكن السياحية · بياناتك محفوظة محلياً على جهازك</p>
      </div>
    </footer>

  </div><!-- /.app-wrapper -->

  <!--
    ══════════════════════════════════════════
    JS Load Order (important):
      1. places.js  — seed data constant
      2. db.js      — IndexedDB abstraction
      3. ui.js      — HTML renderer functions
      4. app.js     — controller + init
    ══════════════════════════════════════════
  -->
  <script src="data/places.js"></script>
  <script src="js/db.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
